name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    name: Lint & Format (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check --target-version py312 .

  # Stable check name for branch protection — succeeds only if every
  # matrix entry of `lint` succeeded.
  lint-gate:
    name: Lint & Format
    needs: lint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify lint matrix succeeded
        if: contains(needs.lint.result, 'failure') || contains(needs.lint.result, 'cancelled') || contains(needs.lint.result, 'skipped')
        run: exit 1

  release:
    name: Semantic Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - lint-gate

    outputs:
      published: ${{ steps.semrel.outputs.new_release_published }}
      version: ${{ steps.semrel.outputs.new_release_version }}
      tag: ${{ steps.semrel.outputs.new_release_git_tag }}
      pulse_version: ${{ steps.pulse_version.outputs.value }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run semantic-release
        id: semrel
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          semantic_version: 24

      - name: Export VERSION
        id: pulse_version
        if: always()
        run: |
          if [[ "${{ steps.semrel.outputs.new_release_published }}" == "true" ]]; then
            version="${{ steps.semrel.outputs.new_release_version }}"
          else
            version="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')" || true
          fi
          if [[ -z "$version" ]]; then
            echo "No version available; skipping export." >&2
            exit 0
          fi
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${version}"

